name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named `copilot-setup-steps`
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and static server
        run: |
          # Install Playwright CLI and a small static server so Playwright tests can run against the site
          npm install -g playwright@1.44.0 http-server
          # Install browser binaries (and system deps) used by Playwright
          playwright install --with-deps

      - name: Quick verification
        run: |
          node -v
          npm -v
          http-server --version || true
          playwright --version
